<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Install Image Audit Pro</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="install-page">
    <main class="install-shell">
      <section class="hero-card">
        <span class="pill">Shopify app starter</span>
        <h1>Image Audit Pro</h1>
        <p>
          Audit product images, find oversized files, and get a cleaner storefront performance workflow.
        </p>

        <form action="/auth" method="get" class="install-form">
          <label for="shop">Your shop domain</label>
          <div class="install-row">
            <input id="shop" name="shop" placeholder="your-store.myshopify.com" required />
            <button type="submit">Install app</button>
          </div>
          <small>Use your permanent <strong>myshopify.com</strong> domain.</small>
        </form>
      </section>
    </main>
  </body>
</html>
