<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Install Image Audit Pro</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="install-page">
    <main class="marketing-shell">
      <section class="hero-card">
        <div>
          <span class="eyebrow">Shopify app starter</span>
          <h1>Image Audit Pro</h1>
          <p class="hero-copy">A clean Shopify app starter with OAuth, uninstall cleanup, settings, and a product image audit dashboard.</p>
          <form action="/auth" method="get" class="install-form">
            <label>
              <span>Your shop domain</span>
              <input name="shop" placeholder="your-store.myshopify.com" required />
            </label>
            <button type="submit" class="primary-btn large-btn">Install app</button>
          </form>
          <div class="inline-links">
            <a href="/privacy">Privacy policy</a>
            <a href="/support">Support</a>
            <a href="/health">Health check</a>
          </div>
        </div>
        <div class="hero-panel">
          <div class="mini-stat"><strong>OAuth</strong><span>Ready</span></div>
          <div class="mini-stat"><strong>Webhook</strong><span>app/uninstalled</span></div>
          <div class="mini-stat"><strong>Storage</strong><span>SQLite</span></div>
          <div class="mini-stat"><strong>Deploy</strong><span>Node / Docker</span></div>
        </div>
      </section>
    </main>
  </body>
</html>
